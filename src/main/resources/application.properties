spring.application.name=expense.manager

# Expiration time in milliseconds (15 minutes)
jwt.expiration-ms=900000
# Refresh token expiration in milliseconds (7 days)
jwt.refresh-expiration-ms=604800000
jwt.secret-key=${EXPENSE_MANAGER_SECRET}

# CORS allowed origins required by SecurityConfig
allowed.origin=http://localhost:4200
allowed.origin.www=http://www.localhost:4200

# DATABASE CONNECTION
spring.datasource.url=jdbc:postgresql://localhost:5432/expense_manager
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true